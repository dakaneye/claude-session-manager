version: 2

builds:
  - main: ./cmd/cs
    binary: cs
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

brews:
  - repository:
      owner: dakaneye
      name: homebrew-tap
    homepage: https://github.com/dakaneye/claude-session-manager
    description: TUI + CLI for managing multiple Claude Code sessions
    license: MIT

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
  groups:
    - title: Features
      regexp: "^feat"
    - title: Bug Fixes
      regexp: "^fix"

release:
  github:
    owner: dakaneye
    name: claude-session-manager
  draft: false
  prerelease: auto
